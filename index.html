<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沪深热</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh}
        .header{background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);border-bottom:1px solid rgba(139,92,246,0.3);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .header h1{font-size:22px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:16px}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .update-time{color:#64748b;font-size:12px}
        .source-tag{color:#f59e0b;font-size:11px;font-weight:600;background:rgba(245,158,11,0.15);padding:2px 8px;border-radius:10px}
        .countdown{color:#a78bfa;font-size:12px;font-weight:600}
        .container{max-width:1700px;margin:0 auto;padding:20px 24px}
        .card{background:#111827;border:1px solid rgba(75,85,99,0.4);border-radius:12px;overflow:hidden;margin-bottom:20px}
        .card-header{padding:14px 20px;border-bottom:1px solid rgba(75,85,99,0.4);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .card-header h2{font-size:15px;color:#f1f5f9;display:flex;align-items:center;gap:8px}
        .dot{width:8px;height:8px;border-radius:50%;background:#a78bfa}
        .card-body{padding:14px 20px}
        .stock-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;max-height:120px;overflow-y:auto;padding:4px 0}
        .stock-btn{padding:5px 12px;border-radius:16px;border:1px solid rgba(139,92,246,0.3);background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;transition:all .2s}
        .stock-btn:hover{border-color:#a78bfa;color:#e2e8f0}
        .stock-btn.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;color:#fff;font-weight:600}
        .chart-container{position:relative;height:380px}
        /* ===== 表格美化 ===== */
        table{width:100%;border-collapse:collapse;font-size:13px}
        thead{position:sticky;top:0;z-index:2}
        th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;background:#0d1117;border-bottom:2px solid rgba(139,92,246,0.3)}
        th.r{text-align:right}
        th.sortable{cursor:pointer;user-select:none;transition:all .2s}
        th.sortable:hover{color:#e2e8f0;background:rgba(139,92,246,0.08)}
        th.sortable .sort-arrow{font-size:10px;margin-left:3px;opacity:.3;transition:all .2s}
        th.sortable.asc{color:#a78bfa}
        th.sortable.asc .sort-arrow{opacity:1;color:#a78bfa}
        th.sortable.desc{color:#60a5fa}
        th.sortable.desc .sort-arrow{opacity:1;color:#60a5fa}
        td{padding:9px 12px;border-bottom:1px solid rgba(75,85,99,0.2);vertical-align:middle}
        tr.hover{transition:background .15s}
        tr.hover:hover{background:rgba(139,92,246,0.06)}
        tr.hover:nth-child(even){background:rgba(255,255,255,0.01)}
        tr.hover:nth-child(even):hover{background:rgba(139,92,246,0.06)}
        td.td-center{text-align:center}
        td.td-right{text-align:right}
        .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;font-size:12px;font-weight:700}
        .r1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
        .r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#000}
        .r3{background:linear-gradient(135deg,#c2884e,#92642e);color:#000}
        .rn{background:rgba(75,85,99,0.3);color:#94a3b8}
        .up{color:#ef4444}.dn{color:#22c55e}.fl{color:#64748b}
        .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-left:4px}
        .tag-zt{background:rgba(239,68,68,0.15);color:#ef4444}
        .tag-qz{background:rgba(245,158,11,0.15);color:#f59e0b}
        .tag-cb{background:rgba(59,130,246,0.15);color:#60a5fa}
        .tag-hot{background:rgba(168,85,247,0.15);color:#a78bfa}
        .tag-board{background:rgba(239,68,68,0.25);color:#fca5a5;font-size:10px;font-weight:700;letter-spacing:.02em}
        .tag-reason{background:rgba(251,191,36,0.15);color:#fbbf24;font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
        .hot-val{color:#f59e0b;font-size:12px;font-weight:600}
        .price-val{color:#e2e8f0;font-size:12px;font-weight:600}
        .cap-val{color:#94a3b8;font-size:11px}
        .code-val{color:#64748b;font-size:11px;font-family:'SF Mono',Monaco,Consolas,monospace}
        a.stock-link{color:#e2e8f0;text-decoration:none;transition:color .2s;font-weight:600}
        a.stock-link:hover{color:#a78bfa;text-decoration:underline}
        .loading{color:#64748b;font-size:13px;text-align:center;padding:40px}
        .fade-in{animation:fadeIn .5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .date-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
        .date-bar label{color:#94a3b8;font-size:12px;font-weight:600}
        .date-chips{display:flex;flex-wrap:wrap;gap:5px}
        .date-chip{padding:4px 12px;border-radius:14px;border:1px solid rgba(75,85,99,0.5);background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
        .date-chip:hover{border-color:#a78bfa;color:#e2e8f0}
        .date-chip.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;color:#fff;font-weight:600}
        .date-chip .snap-count{font-size:9px;opacity:.7;margin-left:3px}
        .view-info{color:#64748b;font-size:11px;margin-left:auto}
        @media(max-width:900px){.container{padding:12px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 沪深热</h1>
        <div class="header-right">
            <a class="source-tag" id="sourceTag" href="https://eq.10jqka.com.cn/frontend/thsTopRank/index.html#/" target="_blank" style="text-decoration:none">同花榜</a>
            <a class="source-tag" href="https://guba.eastmoney.com/rank/" target="_blank" style="text-decoration:none;background:rgba(99,102,241,0.15);color:#818cf8">东财榜</a>
            <a class="source-tag" href="https://www.jiuyangongshe.com/plan" target="_blank" style="text-decoration:none;background:rgba(34,197,94,0.15);color:#4ade80">韭研榜</a>

            <div class="status-dot"></div>

    <div class="container">
        <!-- 趋势图 -->
        <div class="card">
            <div class="card-header">

            <div class="card-body" style="padding:0;overflow-x:auto">
                <table><thead><tr>
                    <th class="td-center sortable" data-key="rank" onclick="doSort('rank')" style="width:52px">同花顺 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="browse_rank" onclick="doSort('browse_rank')">东财 <span class="sort-arrow">⇅</span></th>

                    <th class="r sortable" data-key="price" onclick="doSort('price')">现价 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="change_pct" onclick="doSort('change_pct')">涨跌幅 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="turnover" onclick="doSort('turnover')">换手率 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="hot_value" onclick="doSort('hot_value')">热度 <span class="sort-arrow">⇅</span></th>
                    <th class="td-center" style="width:52px">变动</th>
                    <th class="td-center sortable" data-key="trend_streak" onclick="doSort('trend_streak')">连续趋势 <span class="sort-arrow">⇅</span></th>
                    <th style="width:80px">连板天数</th>
                    <th style="min-width:90px">涨停原因</th>
                    <th style="min-width:80px">行业板块</th>
                    <th class="td-center" style="width:68px">走势</th>
                    <th class="r sortable" data-key="market_cap" onclick="doSort('market_cap')">流通市值 <span class="sort-arrow">⇅</span></th>
                </tr></thead><tbody id="mainTable"><tr><td colspan="15" class="loading">加载中...</td></tr></tbody></table>
            </div>
        </div>
        <!-- 热门概念板块 -->
        <div class="card">
            <div class="card-header"><h2><span class="dot"></span>📈 热门概念板块</h2></div>
            <div class="card-body" style="padding:0;overflow-x:auto">
                <table><thead><tr>
                    <th>板块</th><th class="r sortable" data-key="sec_change" onclick="doSectorSort('sec_change')">涨跌幅 <span class="sort-arrow">⇅</span></th><th class="r sortable" data-key="sec_hot" onclick="doSectorSort('sec_hot')">热度 <span class="sort-arrow">⇅</span></th><th class="r sortable" data-key="sec_board" onclick="doSectorSort('sec_board')">上板家数 <span class="sort-arrow">⇅</span></th><th style="min-width:200px">龙头股</th>
                </tr></thead><tbody id="sectorTable"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
            </div>
        </div>
    </div>
<script>
const BASE = '.';
const COLORS = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#f472b6','#38bdf8','#a3e635','#fb923c','#c084fc','#2dd4bf','#e879f9','#facc15','#4ade80','#f97316','#67e8f9','#a78bfa','#818cf8','#fb7185','#fdba74'];
let rankChart, allSnapshots = [], allCurrentData = null, allSectorsData = null;
let activeStocks = new Set();
let lastUpdate = null, refreshMs = 30 * 60 * 1000;
let selectedDate = null;
let sortKey = null, sortDir = 'desc';
let eastmoneyData = {}; // 存储东财数据
let xueqiuData = {}; // 存储雪球数据

async function fetchJSON(url) {
    try { const r = await fetch(url + '?t=' + Date.now()); return await r.json(); }
    catch(e) { console.error('Fetch error:', url, e); return null; }
}

// 获取东财实时数据
async function fetchEastmoneyData() {
    try {
        // 东财热榜API
        const url = 'https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=100&po=1&np=1&fltt=2&invt=2&fid=f12&fs=m:0+t:6,m:0+t:13,m:1+t:2,m:1+t:23&fields=f12,f13,f14,f2,f3,f5,f10,f20,f21,f22,f33,f34,f35,f36,f37,f38,f39,f40,f41,f42,f43,f44,f45,f46,f47,f48,f49,f50,f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61,f62,f63,f64,f65,f66,f67,f68,f69,f70,f71,f72,f73,f74,f75,f76,f77,f78,f79,f80,f81,f82,f83,f84,f85,f86,f87,f88,f89,f90,f91,f92,f93,f94,f95,f96,f97,f98,f99,f100';
        const r = await fetch(url);
        const data = await r.json();
        if (data && data.data && data.data.diff) {
            const result = {};
            data.data.diff.forEach((item, index) => {
                const code = item.f12;
                result[code] = {
                    browse_rank: index + 1,
                    price: item.f2 || 0,
                    change_pct: item.f3 || 0,
                    turnover: item.f8 || 0
                };
            });
            return result;
        }
    } catch(e) {
        console.error('东财数据获取失败:', e);
    }
    return {};
}

// 获取雪球热榜数据
async function fetchXueqiuData() {
    try {
        // 使用本地缓存的雪球数据
        const data = await fetchJSON(BASE + '/data/xueqiu_hot.json');
        if (data && data.data) {
            const result = {};
            data.data.forEach((item, index) => {
                const code = item.code ? item.code.replace(/^(SH|SZ|BJ)/, '') : '';
                if (code) {
                    result[code] = index + 1;
                }
            });
            return result;
        }
    } catch(e) {
        console.error('雪球数据获取失败:', e);
    }
    return {};
}

function formatHot(val) {
    const n = parseFloat(val);
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return Math.round(n).toString();
}
function formatPrice(val) {
    if (!val || val === 0) return '-';
    return Number(val).toFixed(2);
}
function renderTags(s) {
    let tags = '';
    if (s.popularity_tag) tags += `<span class="tag tag-hot">${s.popularity_tag}</span>`;
    if (s.concept_tags && s.concept_tags.length) s.concept_tags.slice(0, 2).forEach(t => { tags += `<span class="tag tag-cb">${t}</span>`; });
    return tags;
}
function renderBoardInfo(info) {
    if (!info) return '';
    return `<span class="tag tag-board">${info}</span>`;
}
function renderBoardReason(reason) {
    if (!reason) return '';
    return `<span class="tag tag-reason" title="${reason}">${reason}</span>`;
}
function getUniqueDates(snapshots) {
    const dateMap = {};
    snapshots.forEach(s => {
        const d = s.date || s.time.split(' ')[0];
        if (!dateMap[d]) dateMap[d] = { date: d, count: 0, label: d.slice(5) };
        dateMap[d].count++;
    });
    return Object.values(dateMap).sort((a, b) => a.date.localeCompare(b.date));
}
function renderDateChips(dates) {
    const el = document.getElementById('dateChips');
    if (!dates.length) return;
    let html = `<button class="date-chip${!selectedDate?' active':''}" onclick="selectDate(null)">全部<span class="snap-count">${dates.length}天</span></button>`;
    dates.forEach(d => {
        html += `<button class="date-chip${selectedDate===d.date?' active':''}" onclick="selectDate('${d.date}')">${d.label}<span class="snap-count">${d.count}条</span></button>`;
    });
    el.innerHTML = html;
}
function selectDate(date) {
    selectedDate = date;
    renderDateChips(getUniqueDates(allSnapshots));
    updateView();
}
function getFilteredSnapshots() {
    if (!selectedDate) return allSnapshots;
    return allSnapshots.filter(s => (s.date || s.time.split(' ')[0]) === selectedDate);
}
let sectorSortKey = null, sectorSortDir = 'desc';
function doSectorSort(key) {
    if (sectorSortKey === key) { sectorSortDir = sectorSortDir === 'desc' ? 'asc' : 'desc'; }
    else { sectorSortKey = key; sectorSortDir = 'desc'; }
    document.querySelector('#sectorTable').closest('table').querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('asc', 'desc');
        if (th.dataset.key === key) th.classList.add(sectorSortDir);
    });
    renderSectorTable(allSectorsData, allSectorLeaders);
}
let allSectorLeaders = null;
function renderSectorTable(data, leaders) {
    const tb = document.getElementById('sectorTable');
    if (!data || !data.length) { tb.innerHTML = '<tr><td colspan="5" class="loading">暂无数据</td></tr>'; return; }
    if (leaders) allSectorLeaders = leaders;
    let rows = data.slice(0, 30);
    if (sectorSortKey) {
        const dir = sectorSortDir === 'desc' ? -1 : 1;
        rows = [...rows].sort((a, b) => {
            let va, vb;
            if (sectorSortKey === 'sec_change') { va = Number(a['涨跌幅']) || 0; vb = Number(b['涨跌幅']) || 0; }
            else if (sectorSortKey === 'sec_hot') { va = parseFloat(a['热度']) || 0; vb = parseFloat(b['热度']) || 0; }
            else if (sectorSortKey === 'sec_board') {
                const parseBoard = (s) => { const m = (s || '').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
                va = parseBoard(a['上板家数']); vb = parseBoard(b['上板家数']);
            }
            else return 0;
            return (va - vb) * dir;
        });
    }
    tb.innerHTML = rows.map(s => {
        const cc = s['涨跌幅'] > 0 ? '#ef4444' : s['涨跌幅'] < 0 ? '#22c55e' : '#9ca3af';
        const cs = s['涨跌幅'] > 0 ? '+' : '';
        const hotStr = s['热度'] ? formatHot(s['热度']) : '-';
        const boardStr = s['上板家数'] || '-';
        const boardColor = boardStr !== '-' ? '#ef4444' : '#64748b';
        // 龙头股列
        let leadersHtml = '<span style="color:#475569;font-size:11px">加载中...</span>';
        if (allSectorLeaders) {
            const name = s['板块名称'];
            const stocks = allSectorLeaders[name];
            if (stocks && stocks.length > 0) {
                leadersHtml = stocks.map((st, idx) => {
                    const code = (st.code || '').replace(/^(SZ|SH|BJ)/, '');
                    const url = `https://finance.baidu.com/stock/ab-${code}`;
                    const hotVal = st.hot_value ? formatHot(st.hot_value) : '-';
                    const rank = st.rank || idx + 1;
                    return `<a href="${url}" target="_blank" style="color:#94a3b8;text-decoration:none;font-size:11px;margin-right:8px" title="热度 ${hotVal}">${st.name}</a>`;
                }).join('');
            } else {
                leadersHtml = '<span style="color:#475569;font-size:11px">-</span>';
            }
        }
        return `<tr class="hover">
            <td><strong style="color:#e2e8f0">${s['板块名称']}</strong></td>
            <td class="td-right" style="color:${cc};font-weight:600">${cs}${s['涨跌幅']}%</td>
            <td class="td-right"><span class="hot-val">${hotStr}</span></td>
            <td class="td-right" style="color:${boardColor};font-weight:600">${boardStr}</td>
            <td>${leadersHtml}</td>
        </tr>`;
    }).join('');
}
function getRankBadge(rank) {
    if (rank === 1) return '<span class="rank-badge r1">1</span>';
    if (rank === 2) return '<span class="rank-badge r2">2</span>';
    if (rank === 3) return '<span class="rank-badge r3">3</span>';
    return `<span class="rank-badge rn">${rank}</span>`;
}
function getChangeArrow(chg) {
    if (!chg || chg === 0) return '<span style="color:#64748b">—</span>';
    if (chg > 0) return `<span style="color:#22c55e">↑${chg}</span>`;
    return `<span style="color:#ef4444">↓${Math.abs(chg)}</span>`;
}
function getTrendIndicator(stock, snapshots) {
    // 计算连续趋势
    if (!snapshots || snapshots.length < 2) return '<span style="color:#64748b">-</span>';
    const name = stock.name;
    const trends = [];
    for (let i = snapshots.length - 1; i >= 0; i--) {
        const snap = snapshots[i];
        const found = snap.stocks.find(s => s.name === name);
        if (found) {
            trends.push({ time: snap.time, rank: found.rank });
        }
    }
    if (trends.length < 2) return '<span style="color:#64748b">-</span>';
    // 计算趋势方向
    let upCount = 0, downCount = 0;
    for (let i = 1; i < Math.min(trends.length, 5); i++) {
        if (trends[i-1].rank > trends[i].rank) upCount++;
        else if (trends[i-1].rank < trends[i].rank) downCount++;
    }
    const total = upCount + downCount;
    if (total === 0) return '<span style="color:#64748b">-</span>';
    const streak = Math.max(upCount, downCount);
    if (upCount > downCount) return `<span style="color:#ef4444" title="连续上升">🔥↑${streak}</span>`;
    if (downCount > upCount) return `<span style="color:#22c55e" title="连续下降">💧↓${streak}</span>`;
    return '<span style="color:#64748b">→</span>';
}
function doSort(key) {
    if (sortKey === key) { sortDir = sortDir === 'desc' ? 'asc' : 'desc'; }
    else { sortKey = key; sortDir = 'desc'; }
    document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('asc', 'desc');
        if (th.dataset.key === key) th.classList.add(sortDir);
    });
    renderMainTable(allCurrentData);
}
function renderMainTable(data) {
    const tb = document.getElementById('mainTable');
    if (!data || !data.data) { tb.innerHTML = '<tr><td colspan="15" class="loading">暂无数据</td></tr>'; return; }
    let rows = data.data.slice(0, 50);
    // 合并东财和雪球数据
    rows = rows.map(stock => {
        const code = stock.code;
        // 合并东财数据
        if (eastmoneyData[code]) {
            stock.browse_rank = eastmoneyData[code].browse_rank || stock.browse_rank || 0;
            if (eastmoneyData[code].price > 0) stock.price = eastmoneyData[code].price;
            if (eastmoneyData[code].change_pct !== 0) stock.change_pct = eastmoneyData[code].change_pct;
            stock.turnover = eastmoneyData[code].turnover || stock.turnover || 0;
        }
        // 合并雪球数据
        if (xueqiuData[code]) {
            stock.xueqiu_rank = xueqiuData[code];
        }
        return stock;
    });
    if (sortKey) {
        const dir = sortDir === 'desc' ? -1 : 1;
        rows = [...rows].sort((a, b) => {
            let va, vb;
            switch(sortKey) {
                case 'rank': va = a.rank || 999; vb = b.rank || 999; break;
                case 'browse_rank': va = a.browse_rank || 999; vb = b.browse_rank || 999; break;
                case 'xueqiu_rank': va = a.xueqiu_rank || 999; vb = b.xueqiu_rank || 999; break;
                case 'price': va = a.price || 0; vb = b.price || 0; break;
                case 'change_pct': va = a.change_pct || 0; vb = b.change_pct || 0; break;
                case 'turnover': va = a.turnover || 0; vb = b.turnover || 0; break;
                case 'hot_value': va = parseFloat(a.hot_value) || 0; vb = parseFloat(b.hot_value) || 0; break;
                case 'market_cap': va = a.market_cap || 0; vb = b.market_cap || 0; break;
                default: return 0;
            }
            return (va - vb) * dir;
        });
    }
    const filteredSnapshots = getFilteredSnapshots();
    tb.innerHTML = rows.map(s => {
        const code = s.code;
        const url = `https://finance.baidu.com/stock/ab-${code}`;
        const price = formatPrice(s.price);
        const changeColor = s.change_pct > 0 ? '#ef4444' : s.change_pct < 0 ? '#22c55e' : '#9ca3af';
        const changeSign = s.change_pct > 0 ? '+' : '';
        const hotStr = formatHot(s.hot_value);
        const turnoverStr = s.turnover ? s.turnover + '%' : '-';
        const capStr = s.market_cap ? (s.market_cap >= 100000000 ? (s.market_cap/100000000).toFixed(1) + '亿' : s.market_cap) : '-';
        const rankChg = getChangeArrow(s.rank_chg);
        const trendIndicator = getTrendIndicator(s, filteredSnapshots);
        // 连板信息
        const boardDays = s.board_info ? s.board_info.match(/(\d+)天(\d+)板/) : null;
        const daysStr = boardDays ? boardDays[0] : '-';
        const reasonStr = s.board_reason || '-';
        const conceptStr = s.concept_tags ? s.concept_tags.slice(0, 2).join(' ') : '-';
        // 东财排名显示
        const emRank = s.browse_rank && s.browse_rank > 0 ? `<span style="color:#818cf8;font-weight:600">#${s.browse_rank}</span>` : '<span style="color:#475569">-</span>';
        // 雪球排名显示
        const xqRank = s.xueqiu_rank && s.xueqiu_rank > 0 ? `<span style="color:#c084fc;font-weight:600">#${s.xueqiu_rank}</span>` : '<span style="color:#475569">-</span>';
        // 涨停标签
        let ztTag = '';
        if (s.change_pct >= 9.9) ztTag = '<span class="tag tag-zt">涨停</span>';
        else if (s.change_pct >= 5) ztTag = '<span class="tag tag-qz">强势</span>';
        return `<tr class="hover">
            <td class="td-center">${getRankBadge(s.rank)}</td>
            <td class="td-right">${emRank}</td>
            <td class="td-right">${xqRank}</td>
            <td><a href="${url}" target="_blank" class="stock-link">${s.name}</a>${ztTag}${renderTags(s)}</td>
            <td class="td-right price-val">${price}</td>
            <td class="td-right" style="color:${changeColor};font-weight:600">${changeSign}${s.change_pct}%</td>
            <td class="td-right">${turnoverStr}</td>
            <td class="td-right"><span class="hot-val">${hotStr}</span></td>
            <td class="td-center">${rankChg}</td>
            <td class="td-center">${trendIndicator}</td>
            <td>${renderBoardInfo(daysStr)}</td>
            <td>${renderBoardReason(reasonStr)}</td>
            <td><span style="color:#94a3b8;font-size:11px">${conceptStr}</span></td>
            <td class="td-center"><span style="color:#64748b;font-size:11px">-</span></td>
            <td class="td-right cap-val">${capStr}</td>
        </tr>`;
    }).join('');
}
function updateTimeDisplay() {
    const now = new Date();
    const timeStr = now.toLocaleString('zh-CN', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit',
        hour12: false 
    });
    document.getElementById('updateTime').textContent = timeStr;
}
function updateCountdown() {
    if (!lastUpdate) return;
    const now = Date.now();
    const elapsed = now - lastUpdate;
    const remaining = Math.max(0, refreshMs - elapsed);
    const min = Math.floor(remaining / 60000);
    const sec = Math.floor((remaining % 60000) / 1000);
    document.getElementById('countdown').textContent = `${min}:${sec.toString().padStart(2, '0')} 后刷新`;
    if (remaining <= 0) {
        location.reload();
    }
}
function renderStockSelector() {
    const el = document.getElementById('stockSelector');
    const filtered = getFilteredSnapshots();
    if (!filtered.length) { el.innerHTML = ''; return; }
    // 获取最近快照中的股票
    const latest = filtered[filtered.length - 1];
    const stocks = latest.stocks.slice(0, 30);
    let html = '';
    stocks.forEach((s, idx) => {
        const active = activeStocks.has(s.name) ? 'active' : '';
        html += `<button class="stock-btn ${active}" onclick="toggleStock('${s.name}')">${s.name}</button>`;
    });
    el.innerHTML = html;
}
function toggleStock(name) {
    if (activeStocks.has(name)) activeStocks.delete(name);
    else activeStocks.add(name);
    renderStockSelector();
    updateChart();
}
function updateChart() {
    const filtered = getFilteredSnapshots();
    if (!filtered.length || !activeStocks.size) {
        if (rankChart) { rankChart.destroy(); rankChart = null; }
        return;
    }
    const labels = filtered.map(s => s.time);
    const datasets = [];
    let colorIdx = 0;
    activeStocks.forEach(name => {
        const data = filtered.map(snap => {
            const found = snap.stocks.find(st => st.name === name);
            return found ? found.rank : null;
        });
        datasets.push({
            label: name,
            data: data,
            borderColor: COLORS[colorIdx % COLORS.length],
            backgroundColor: COLORS[colorIdx % COLORS.length] + '20',
            tension: 0.3,
            fill: false,
            pointRadius: 3,
            pointHoverRadius: 5
        });
        colorIdx++;
    });
    const ctx = document.getElementById('rankChart').getContext('2d');
    if (rankChart) rankChart.destroy();
    rankChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#1e293b',
                    titleColor: '#e2e8f0',
                    bodyColor: '#e2e8f0',
                    borderColor: '#475569',
                    borderWidth: 1
                }
            },
            scales: {
                x: {
                    grid: { color: '#334155' },
                    ticks: { color: '#94a3b8', maxTicksLimit: 8 }
                },
                y: {
                    reverse: true,
                    grid: { color: '#334155' },
                    ticks: { color: '#94a3b8' },
                    title: { display: true, text: '排名', color: '#64748b' }
                }
            }
        }
    });
}
function updateView() {
    renderStockSelector();
    updateChart();
    renderMainTable(allCurrentData);
    const filtered = getFilteredSnapshots();
    document.getElementById('viewInfo').textContent = `显示全部 ${filtered.length} 条快照（${getUniqueDates(allSnapshots).length} 天）`;
}
async function init() {
    // 启动客户端时间更新
    updateTimeDisplay();
    setInterval(updateTimeDisplay, 1000);
    
    // 并行加载数据
    const [current, sectors, snapshots, xueqiu] = await Promise.all([
        fetchJSON(BASE + '/data/current.json'),
        fetchJSON(BASE + '/data/sectors.json'),
        fetchJSON(BASE + '/data/snapshots.json'),
        fetchJSON(BASE + '/data/xueqiu_hot.json')
    ]);
    
    // 处理雪球数据
    if (xueqiu && xueqiu.data) {
        xueqiuData = {};
        xueqiu.data.forEach((item, index) => {
            const code = item.code ? item.code.replace(/^(SH|SZ|BJ)/, '') : '';
            if (code) {
                xueqiuData[code] = index + 1;
            }
        });
    }
    
    // 尝试获取东财数据
    try {
        eastmoneyData = await fetchEastmoneyData();
        console.log('东财数据获取成功:', Object.keys(eastmoneyData).length, '只股票');
    } catch(e) {
        console.error('东财数据获取失败:', e);
        eastmoneyData = {};
    }
    
    allCurrentData = current;
    if (current && current.update_time) {
        lastUpdate = new Date(current.update_time).getTime();
    } else {
        lastUpdate = Date.now();
    }
    
    // 设置数据更新时间显示
    if (current && current.update_time) {
        document.getElementById('detailDateLabel').textContent = `数据更新: ${current.update_time}`;
    }
    
    if (sectors && sectors.data) allSectorsData = sectors.data;
    if (snapshots && Array.isArray(snapshots)) allSnapshots = snapshots;
    
    renderDateChips(getUniqueDates(allSnapshots));
    updateView();
    renderSectorTable(allSectorsData, null);
    
    // 加载板块龙头股数据
    const leaders = await fetchJSON(BASE + '/data/sector_leaders.json');
    if (leaders && leaders.data) {
        renderSectorTable(allSectorsData, leaders.data);
    }
    
    // 启动倒计时
    setInterval(updateCountdown, 1000);
    updateCountdown();
}
init();
</script>
