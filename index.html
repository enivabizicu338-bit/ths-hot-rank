<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同花顺热榜 · 30天动态趋势</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh}
        .header{background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);border-bottom:1px solid rgba(139,92,246,0.3);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .header h1{font-size:22px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:16px}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .update-time{color:#64748b;font-size:12px}
        .source-tag{color:#f59e0b;font-size:11px;font-weight:600;background:rgba(245,158,11,0.15);padding:2px 8px;border-radius:10px}
        .countdown{color:#a78bfa;font-size:12px;font-weight:600}
        .container{max-width:1440px;margin:0 auto;padding:20px 24px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
        .card{background:#111827;border:1px solid rgba(75,85,99,0.4);border-radius:12px;overflow:hidden}
        .card-full{grid-column:1/-1}
        .card-header{padding:14px 20px;border-bottom:1px solid rgba(75,85,99,0.4);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .card-header h2{font-size:15px;color:#f1f5f9;display:flex;align-items:center;gap:8px}
        .dot{width:8px;height:8px;border-radius:50%;background:#a78bfa}
        .card-body{padding:14px 20px}
        .stock-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
        .stock-btn{padding:5px 12px;border-radius:16px;border:1px solid rgba(139,92,246,0.3);background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;transition:all .2s}
        .stock-btn:hover{border-color:#a78bfa;color:#e2e8f0}
        .stock-btn.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;color:#fff;font-weight:600}
        .chart-container{position:relative;height:380px}
        table{width:100%;border-collapse:collapse}
        th{padding:8px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid rgba(75,85,99,0.4)}
        th.r{text-align:right}
        td{padding:0}
        tr.hover:hover{background:rgba(255,255,255,0.03)}
        .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;font-size:12px;font-weight:700}
        .r1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
        .r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#000}
        .r3{background:linear-gradient(135deg,#c2884e,#92642e);color:#000}
        .rn{background:rgba(75,85,99,0.3);color:#94a3b8}
        .up{color:#ef4444}.dn{color:#22c55e}.fl{color:#64748b}
        .tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;margin-left:4px}
        .tag-zt{background:rgba(239,68,68,0.15);color:#ef4444}
        .tag-qz{background:rgba(245,158,11,0.15);color:#f59e0b}
        .tag-cb{background:rgba(59,130,246,0.15);color:#60a5fa}
        .tag-hot{background:rgba(168,85,247,0.15);color:#a78bfa}
        .hot-val{color:#f59e0b;font-size:11px;font-weight:600}
        .loading{color:#64748b;font-size:13px;text-align:center;padding:40px}
        .fade-in{animation:fadeIn .5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .date-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
        .date-bar label{color:#94a3b8;font-size:12px;font-weight:600}
        .date-chips{display:flex;flex-wrap:wrap;gap:5px}
        .date-chip{padding:4px 12px;border-radius:14px;border:1px solid rgba(75,85,99,0.5);background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
        .date-chip:hover{border-color:#a78bfa;color:#e2e8f0}
        .date-chip.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;color:#fff;font-weight:600}
        .date-chip .snap-count{font-size:9px;opacity:.7;margin-left:3px}
        .view-info{color:#64748b;font-size:11px;margin-left:auto}
        @media(max-width:900px){.grid{grid-template-columns:1fr}.container{padding:12px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 同花顺热榜 · 30天趋势</h1>
        <div class="header-right">
            <span class="source-tag" id="sourceTag">同花顺</span>
            <div class="status-dot"></div>
            <div class="update-time" id="updateTime">加载中...</div>
            <div class="countdown" id="countdown"></div>
        </div>
    </div>
    <div class="container">
        <div class="card card-full">
            <div class="card-header">
                <h2><span class="dot"></span>热门股票排名变化趋势</h2>
                <span style="color:#64748b;font-size:11px">点击股票名切换 · Y轴反转(↑=热度上升) · 数据保留30天</span>
            </div>
            <div class="card-body">
                <div class="date-bar" id="dateBar">
                    <label>📅 日期筛选:</label>
                    <div class="date-chips" id="dateChips"></div>
                    <span class="view-info" id="viewInfo"></span>
                </div>
                <div class="stock-selector" id="stockSelector"></div>
                <div class="chart-container"><canvas id="rankChart"></canvas></div>
            </div>
        </div>
        <div class="grid">
            <div class="card">
                <div class="card-header"><h2><span class="dot"></span>🔥 实时热榜 TOP 30</h2></div>
                <div class="card-body" style="padding:0;overflow-x:auto">
                    <table><thead><tr>
                        <th style="width:50px;text-align:center">排名</th><th>代码</th><th>名称</th><th class="r">涨跌幅</th><th class="r">热度</th>
                    </tr></thead><tbody id="hotTable"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h2><span class="dot"></span>📈 热门概念板块</h2></div>
                <div class="card-body" style="padding:0;overflow-x:auto">
                    <table><thead><tr>
                        <th>板块</th><th class="r">涨跌幅</th><th class="r">热度</th><th>标签</th>
                    </tr></thead><tbody id="sectorTable"><tr><td colspan="4" class="loading">加载中...</td></tr></tbody></table>
                </div>
            </div>
        </div>
        <div class="card card-full">
            <div class="card-header">
                <h2><span class="dot"></span>📋 排名变动详情 TOP 30</h2>
                <span id="detailDateLabel" style="color:#a78bfa;font-size:12px"></span>
            </div>
            <div class="card-body" style="padding:0;overflow-x:auto">
                <table><thead><tr>
                    <th style="width:50px;text-align:center">排名</th><th>代码</th><th>名称</th><th class="r">涨跌幅</th><th>标签</th><th style="text-align:center">变动</th><th style="text-align:center">迷你趋势</th>
                </tr></thead><tbody id="detailTable"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody></table>
            </div>
        </div>
    </div>
<script>
const BASE = '.';
const COLORS = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#f472b6','#38bdf8','#a3e635','#fb923c','#c084fc','#2dd4bf','#e879f9','#facc15','#4ade80','#f97316'];
let rankChart, allSnapshots = [], allCurrentData = null, allSectorsData = null;
let activeStocks = new Set();
let lastUpdate = null, refreshMs = 30 * 60 * 1000;
let selectedDate = null;

async function fetchJSON(url) {
    try { const r = await fetch(url + '?t=' + Date.now()); return await r.json(); }
    catch(e) { console.error('Fetch error:', url, e); return null; }
}

function formatHot(val) {
    const n = parseFloat(val);
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return Math.round(n).toString();
}

function renderTags(s) {
    let tags = '';
    if (s.popularity_tag) tags += `<span class="tag tag-hot">${s.popularity_tag}</span>`;
    if (s.concept_tags && s.concept_tags.length) s.concept_tags.slice(0, 2).forEach(t => { tags += `<span class="tag tag-cb">${t}</span>`; });
    return tags;
}

function getUniqueDates(snapshots) {
    const dateMap = {};
    snapshots.forEach(s => {
        const d = s.date || s.time.split(' ')[0];
        if (!dateMap[d]) dateMap[d] = { date: d, count: 0, label: d.slice(5) };
        dateMap[d].count++;
    });
    return Object.values(dateMap).sort((a, b) => a.date.localeCompare(b.date));
}

function renderDateChips(dates) {
    const el = document.getElementById('dateChips');
    if (!dates.length) return;
    let html = `<button class="date-chip${!selectedDate?' active':''}" onclick="selectDate(null)">全部<span class="snap-count">${dates.length}天</span></button>`;
    dates.forEach(d => {
        html += `<button class="date-chip${selectedDate===d.date?' active':''}" onclick="selectDate('${d.date}')">${d.label}<span class="snap-count">${d.count}条</span></button>`;
    });
    el.innerHTML = html;
}

function selectDate(date) {
    selectedDate = date;
    renderDateChips(getUniqueDates(allSnapshots));
    updateView();
}

function getFilteredSnapshots() {
    if (!selectedDate) return allSnapshots;
    return allSnapshots.filter(s => (s.date || s.time.split(' ')[0]) === selectedDate);
}

function renderHotTable(data) {
    const tb = document.getElementById('hotTable');
    if (!data || !data.length) { tb.innerHTML = '<tr><td colspan="5" class="loading">暂无数据</td></tr>'; return; }
    tb.innerHTML = data.slice(0, 30).map((s, i) => {
        const cc = s.change_pct > 0 ? '#ef4444' : s.change_pct < 0 ? '#22c55e' : '#9ca3af';
        const cs = s.change_pct > 0 ? '+' : '';
        const rc = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
        const tag = s.change_pct >= 9.9 ? '<span class="tag tag-zt">涨停</span>' : s.change_pct >= 5 ? '<span class="tag tag-qz">强势</span>' : '';
        const hotStr = s.hot_value ? formatHot(s.hot_value) : '-';
        return `<tr class="hover"><td class="py-2 px-4 text-center"><span class="rank-badge ${rc}">${s.rank}</span></td><td class="py-2 px-4 font-mono text-gray-400" style="font-size:12px">${s.code}</td><td class="py-2 px-4 font-semibold text-white">${s.name}${tag}</td><td class="py-2 px-4 text-right font-semibold" style="color:${cc}">${cs}${Number(s.change_pct).toFixed(2)}%</td><td class="py-2 px-4 text-right hot-val">${hotStr}</td></tr>`;
    }).join('');
}

function renderSectorTable(data) {
    const tb = document.getElementById('sectorTable');
    if (!data || !data.length) { tb.innerHTML = '<tr><td colspan="4" class="loading">暂无数据</td></tr>'; return; }
    tb.innerHTML = data.slice(0, 15).map(s => {
        const cc = s['涨跌幅'] > 0 ? '#ef4444' : s['涨跌幅'] < 0 ? '#22c55e' : '#9ca3af';
        const cs = s['涨跌幅'] > 0 ? '+' : '';
        const hotStr = s['热度'] ? formatHot(s['热度']) : '-';
        const label = s['标签'] || '';
        return `<tr class="hover"><td class="py-2 px-4 font-semibold text-white">${s['板块名称']}</td><td class="py-2 px-4 text-right font-semibold" style="color:${cc}">${cs}${Number(s['涨跌幅']).toFixed(2)}%</td><td class="py-2 px-4 text-right hot-val">${hotStr}</td><td class="py-2 px-4" style="font-size:11px;color:#f59e0b">${label}</td></tr>`;
    }).join('');
}

function buildTrendData(snapshots, currentData) {
    const stockMap = {};
    for (const snap of snapshots) {
        for (const stock of snap.stocks) {
            if (!stockMap[stock.code]) stockMap[stock.code] = { code: stock.code, name: stock.name, current_price: stock.price, current_change_pct: stock.change_pct, rank_history: [], popularity_tag: '', concept_tags: [] };
            stockMap[stock.code].rank_history.push({ time: snap.time, rank: stock.rank, date: snap.date });
            stockMap[stock.code].current_price = stock.price;
            stockMap[stock.code].current_change_pct = stock.change_pct;
        }
    }
    if (currentData) {
        for (const s of currentData) {
            if (stockMap[s.code]) {
                stockMap[s.code].current_price = s.price;
                stockMap[s.code].current_change_pct = s.change_pct;
                stockMap[s.code].popularity_tag = s.popularity_tag || '';
                stockMap[s.code].concept_tags = s.concept_tags || [];
            }
        }
    }
    const sorted = Object.values(stockMap).sort((a, b) => {
        const aR = a.rank_history.length ? a.rank_history[a.rank_history.length-1].rank : 999;
        const bR = b.rank_history.length ? b.rank_history[b.rank_history.length-1].rank : 999;
        return aR - bR;
    });
    return { time_labels: snapshots.map(s => s.time), stocks: sorted.slice(0, 30) };
}

function renderDetailTable(stocks) {
    const tb = document.getElementById('detailTable');
    if (!stocks || !stocks.length) { tb.innerHTML = '<tr><td colspan="7" class="loading">暂无数据</td></tr>'; return; }
    tb.innerHTML = stocks.slice(0, 30).map((s, i) => {
        const hist = s.rank_history;
        if (!hist || !hist.length) return '';
        const curr = hist[hist.length-1].rank;
        let diff, tc, tt, sparkColor, pts;
        if (hist.length >= 2) {
            const prev = hist[hist.length-2].rank;
            diff = prev - curr;
            tc = diff > 0 ? 'up' : diff < 0 ? 'dn' : 'fl';
            tt = diff > 0 ? '↑ '+diff : diff < 0 ? '↓ '+Math.abs(diff) : '—';
            sparkColor = tc==='up'?'#ef4444':tc==='dn'?'#22c55e':'#64748b';
            const sparkData = hist.slice(-20);
            const maxR = Math.max(...sparkData.map(h=>h.rank), 1);
            pts = sparkData.map((h,j) => `${j*(56/(sparkData.length-1||1))+2},${Math.min(h.rank/maxR*18+2,22)}`).join(' ');
        } else {
            diff = 0; tc = 'fl'; tt = '新'; sparkColor = '#64748b'; pts = `2,12`;
        }
        const rc = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
        const cc = s.current_change_pct > 0 ? '#ef4444' : s.current_change_pct < 0 ? '#22c55e' : '#9ca3af';
        const cs = s.current_change_pct > 0 ? '+' : '';
        const tag = s.current_change_pct >= 9.9 ? '<span class="tag tag-zt">涨停</span>' : s.current_change_pct >= 5 ? '<span class="tag tag-qz">强势</span>' : '';
        const extraTags = renderTags(s);
        return `<tr class="hover"><td class="py-2 px-4 text-center"><span class="rank-badge ${rc}">${curr}</span></td><td class="py-2 px-4 font-mono text-gray-400" style="font-size:12px">${s.code}</td><td class="py-2 px-4 font-semibold text-white">${s.name}${tag}</td><td class="py-2 px-4 text-right font-semibold" style="color:${cc}">${cs}${Number(s.current_change_pct).toFixed(2)}%</td><td class="py-2 px-4" style="font-size:11px">${extraTags}</td><td class="py-2 px-4 text-center ${tc} font-semibold">${tt}</td><td class="py-2 px-4 text-center"><svg width="60" height="24"><polyline fill="none" stroke="${sparkColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/></svg></td></tr>`;
    }).join('');
}

function renderSelector(stocks) {
    const el = document.getElementById('stockSelector');
    if (!stocks || !stocks.length) return;
    if (activeStocks.size === 0) stocks.slice(0, 5).forEach(s => activeStocks.add(s.code));
    el.innerHTML = stocks.slice(0, 20).map(s =>
        `<button class="stock-btn${activeStocks.has(s.code)?' active':''}" onclick="toggleStock('${s.code}')">${s.name}</button>`
    ).join('');
}

function toggleStock(code) {
    if (activeStocks.has(code)) activeStocks.delete(code);
    else activeStocks.add(code);
    updateChart();
    renderSelector(currentTrendData?.stocks || []);
}

let currentTrendData = null;

function createChart(labels) {
    const ctx = document.getElementById('rankChart').getContext('2d');
    rankChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [] },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { color: '#94a3b8', usePointStyle: true, padding: 14, font: { size: 11 } } },
                tooltip: { backgroundColor: '#1e293b', titleColor: '#f1f5f9', bodyColor: '#94a3b8', borderColor: 'rgba(139,92,246,0.3)', borderWidth: 1,
                    callbacks: { label: ctx => ctx.dataset.label + ': 第' + ctx.parsed.y + '名' }
                }
            },
            scales: {
                y: { reverse: true, min: 1, title: { display: true, text: '排名', color: '#64748b' }, ticks: { color: '#64748b', stepSize: 5 }, grid: { color: 'rgba(75,85,99,0.2)' } },
                x: { ticks: { color: '#64748b', maxRotation: 45, maxTicksLimit: 20 }, grid: { color: 'rgba(75,85,99,0.1)' } }
            },
            animation: { duration: 600, easing: 'easeOutQuart' }
        }
    });
}

function updateChart() {
    if (!rankChart || !currentTrendData) return;
    const datasets = [];
    let ci = 0;
    (currentTrendData.stocks || []).forEach(s => {
        if (!activeStocks.has(s.code)) return;
        datasets.push({
            label: s.name, data: s.rank_history.map(h => h.rank),
            borderColor: COLORS[ci % COLORS.length], backgroundColor: COLORS[ci % COLORS.length] + '20',
            borderWidth: 2.5, pointRadius: s.rank_history.length > 50 ? 0 : 2, pointHoverRadius: 5, tension: 0.3, fill: false
        });
        ci++;
    });
    rankChart.data.datasets = datasets;
    rankChart.update();
}

function updateCountdown() {
    if (!lastUpdate) return;
    const elapsed = Date.now() - lastUpdate;
    const remain = Math.max(0, refreshMs - elapsed);
    const m = Math.floor(remain / 60000);
    const s = Math.floor((remain % 60000) / 1000);
    document.getElementById('countdown').textContent = `${m}:${s.toString().padStart(2,'0')} 后刷新`;
}

function updateView() {
    const filtered = getFilteredSnapshots();
    currentTrendData = buildTrendData(filtered, allCurrentData);
    const info = document.getElementById('viewInfo');
    const dateLabel = document.getElementById('detailDateLabel');
    if (selectedDate) {
        info.textContent = `显示 ${selectedDate.slice(5)} 共 ${filtered.length} 条快照`;
        dateLabel.textContent = `📅 ${selectedDate}`;
    } else {
        info.textContent = `显示全部 ${filtered.length} 条快照（${getUniqueDates(allSnapshots).length} 天）`;
        dateLabel.textContent = '';
    }
    renderSelector(currentTrendData.stocks);
    renderDetailTable(currentTrendData.stocks);
    if (!rankChart) { createChart(currentTrendData.time_labels); }
    else { rankChart.data.labels = currentTrendData.time_labels; updateChart(); }
}

async function loadAll() {
    const [snapshots, current, sectors] = await Promise.all([
        fetchJSON(BASE + '/data/snapshots.json'),
        fetchJSON(BASE + '/data/current.json'),
        fetchJSON(BASE + '/data/sectors.json')
    ]);
    allSnapshots = snapshots || [];
    allCurrentData = current?.data || null;
    allSectorsData = sectors?.data || null;
    if (current) {
        renderHotTable(current.data);
        document.getElementById('updateTime').textContent = '更新: ' + (current.update_time || '未知');
        if (current.source) document.getElementById('sourceTag').textContent = current.source;
    }
    if (allSectorsData) renderSectorTable(allSectorsData);
    if (allSnapshots.length > 0) {
        renderDateChips(getUniqueDates(allSnapshots));
        updateView();
    } else {
        document.getElementById('detailTable').innerHTML = '<tr><td colspan="7" class="loading">数据采集中，请稍候...（首次部署需等待 GitHub Actions 运行）</td></tr>';
    }
    lastUpdate = Date.now();
}

loadAll();
setInterval(updateCountdown, 1000);
setInterval(loadAll, refreshMs);
</script>
</body>
</html>
