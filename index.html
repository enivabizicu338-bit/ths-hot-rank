<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>为你股神走暗香</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e17;color:#e2e8f0;min-height:100vh}
        .header{background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);border-bottom:1px solid rgba(139,92,246,0.3);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        .header h1{font-size:22px;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:16px}
        .status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .update-time{color:#64748b;font-size:12px}
        .source-tag{color:#f59e0b;font-size:11px;font-weight:600;background:rgba(245,158,11,0.15);padding:2px 8px;border-radius:10px}
        .countdown{color:#a78bfa;font-size:12px;font-weight:600}
        .container{max-width:1700px;margin:0 auto;padding:20px 24px}
        .card{background:#111827;border:1px solid rgba(75,85,99,0.4);border-radius:12px;overflow:hidden;margin-bottom:20px}
        .card-header{padding:14px 20px;border-bottom:1px solid rgba(75,85,99,0.4);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
        .card-header h2{font-size:15px;color:#f1f5f9;display:flex;align-items:center;gap:8px}
        .dot{width:8px;height:8px;border-radius:50%;background:#a78bfa}
        .card-body{padding:14px 20px}
        .stock-selector{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;max-height:120px;overflow-y:auto;padding:4px 0}
        .stock-btn{padding:5px 12px;border-radius:16px;border:1px solid rgba(139,92,246,0.3);background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;transition:all .2s}
        .stock-btn:hover{border-color:#a78bfa;color:#e2e8f0}
        .stock-btn.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;color:#fff;font-weight:600}
        .chart-container{position:relative;height:380px}

        /* ===== 表格美化 ===== */
        table{width:100%;border-collapse:collapse;font-size:13px}
        thead{position:sticky;top:0;z-index:2}
        th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;background:#0d1117;border-bottom:2px solid rgba(139,92,246,0.3)}
        th.r{text-align:right}
        th.sortable{cursor:pointer;user-select:none;transition:all .2s}
        th.sortable:hover{color:#e2e8f0;background:rgba(139,92,246,0.08)}
        th.sortable .sort-arrow{font-size:10px;margin-left:3px;opacity:.3;transition:all .2s}
        th.sortable.asc{color:#a78bfa}
        th.sortable.asc .sort-arrow{opacity:1;color:#a78bfa}
        th.sortable.desc{color:#60a5fa}
        th.sortable.desc .sort-arrow{opacity:1;color:#60a5fa}
        td{padding:9px 12px;border-bottom:1px solid rgba(75,85,99,0.2);vertical-align:middle}
        tr.hover{transition:background .15s}
        tr.hover:hover{background:rgba(139,92,246,0.06)}
        tr.hover:nth-child(even){background:rgba(255,255,255,0.01)}
        tr.hover:nth-child(even):hover{background:rgba(139,92,246,0.06)}
        td.td-center{text-align:center}
        td.td-right{text-align:right}

        .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;font-size:12px;font-weight:700}
        .r1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
        .r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#000}
        .r3{background:linear-gradient(135deg,#c2884e,#92642e);color:#000}
        .rn{background:rgba(75,85,99,0.3);color:#94a3b8}
        .up{color:#ef4444}.dn{color:#22c55e}.fl{color:#64748b}
        .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;margin-left:4px}
        .tag-zt{background:rgba(239,68,68,0.15);color:#ef4444}
        .tag-qz{background:rgba(245,158,11,0.15);color:#f59e0b}
        .tag-cb{background:rgba(59,130,246,0.15);color:#60a5fa}
        .tag-hot{background:rgba(168,85,247,0.15);color:#a78bfa}
        .tag-board{background:rgba(239,68,68,0.25);color:#fca5a5;font-size:10px;font-weight:700;letter-spacing:.02em}
        .tag-reason{background:rgba(251,191,36,0.15);color:#fbbf24;font-size:10px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle}
        .hot-val{color:#f59e0b;font-size:12px;font-weight:600}
        .price-val{color:#e2e8f0;font-size:12px;font-weight:600}
        .cap-val{color:#94a3b8;font-size:11px}
        .code-val{color:#64748b;font-size:11px;font-family:'SF Mono',Monaco,Consolas,monospace}
        a.stock-link{color:#e2e8f0;text-decoration:none;transition:color .2s;font-weight:600}
        a.stock-link:hover{color:#a78bfa;text-decoration:underline}
        .loading{color:#64748b;font-size:13px;text-align:center;padding:40px}
        .fade-in{animation:fadeIn .5s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .date-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
        .date-bar label{color:#94a3b8;font-size:12px;font-weight:600}
        .date-chips{display:flex;flex-wrap:wrap;gap:5px}
        .date-chip{padding:4px 12px;border-radius:14px;border:1px solid rgba(75,85,99,0.5);background:transparent;color:#94a3b8;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
        .date-chip:hover{border-color:#a78bfa;color:#e2e8f0}
        .date-chip.active{background:linear-gradient(135deg,#7c3aed,#3b82f6);border-color:transparent;color:#fff;font-weight:600}
        .date-chip .snap-count{font-size:9px;opacity:.7;margin-left:3px}
        .view-info{color:#64748b;font-size:11px;margin-left:auto}
        @media(max-width:900px){.container{padding:12px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 为你股神走暗香</h1>
        <div class="header-right">
            <a class="source-tag" id="sourceTag" href="https://eq.10jqka.com.cn/frontend/thsTopRank/index.html#/" target="_blank" style="text-decoration:none">同花顺热榜</a>
            <a class="source-tag" href="https://guba.eastmoney.com/rank/" target="_blank" style="text-decoration:none;background:rgba(99,102,241,0.15);color:#818cf8">东方财富热榜</a>
            <div class="status-dot"></div>
            <div class="update-time" id="updateTime">加载中...</div>
            <div class="countdown" id="countdown"></div>
        </div>
    </div>
    <div class="container">
        <!-- 趋势图 -->
        <div class="card">
            <div class="card-header">
                <h2><span class="dot"></span>热门股票排名变化趋势 TOP 50</h2>
                <span style="color:#64748b;font-size:11px">点击股票名切换 · Y轴反转(↑=热度上升) · 数据保留30天</span>
            </div>
            <div class="card-body">
                <div class="date-bar" id="dateBar">
                    <label>📅 日期筛选:</label>
                    <div class="date-chips" id="dateChips"></div>
                    <span class="view-info" id="viewInfo"></span>
                </div>
                <div class="stock-selector" id="stockSelector"></div>
                <div class="chart-container"><canvas id="rankChart"></canvas></div>
            </div>
        </div>
        <!-- 合并热榜表格 -->
        <div class="card">
            <div class="card-header">
                <h2><span class="dot"></span>🔥 热榜详情 TOP 50</h2>
                <span id="detailDateLabel" style="color:#a78bfa;font-size:12px"></span>
            </div>
            <div class="card-body" style="padding:0;overflow-x:auto">
                <table><thead><tr>
                    <th class="td-center sortable" data-key="rank" onclick="doSort('rank')" style="width:52px">同花顺 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="browse_rank" onclick="doSort('browse_rank')">东财 <span class="sort-arrow">⇅</span></th>
                    <th style="min-width:90px">名称</th>
                    <th class="r sortable" data-key="price" onclick="doSort('price')">现价 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="change_pct" onclick="doSort('change_pct')">涨跌幅 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="turnover" onclick="doSort('turnover')">换手率 <span class="sort-arrow">⇅</span></th>
                    <th class="r sortable" data-key="hot_value" onclick="doSort('hot_value')">热度 <span class="sort-arrow">⇅</span></th>
                    <th class="td-center" style="width:52px">变动</th>
                    <th class="td-center sortable" data-key="trend_streak" onclick="doSort('trend_streak')">连续趋势 <span class="sort-arrow">⇅</span></th>
                    <th style="width:80px">连板天数</th>
                    <th style="min-width:90px">涨停原因</th>
                    <th style="min-width:80px">行业板块</th>
                    <th class="td-center" style="width:68px">走势</th>
                    <th class="r sortable" data-key="market_cap" onclick="doSort('market_cap')">流通市值 <span class="sort-arrow">⇅</span></th>
                </tr></thead><tbody id="mainTable"><tr><td colspan="14" class="loading">加载中...</td></tr></tbody></table>
            </div>
        </div>
        <!-- 热门概念板块 -->
        <div class="card">
            <div class="card-header"><h2><span class="dot"></span>📈 热门概念板块</h2></div>
            <div class="card-body" style="padding:0;overflow-x:auto">
                <table><thead><tr>
                    <th>板块</th><th class="r sortable" data-key="sec_change" onclick="doSectorSort('sec_change')">涨跌幅 <span class="sort-arrow">⇅</span></th><th class="r sortable" data-key="sec_hot" onclick="doSectorSort('sec_hot')">热度 <span class="sort-arrow">⇅</span></th><th class="r sortable" data-key="sec_board" onclick="doSectorSort('sec_board')">上板家数 <span class="sort-arrow">⇅</span></th><th style="min-width:200px">龙头股</th>
                </tr></thead><tbody id="sectorTable"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody></table>
            </div>
        </div>
    </div>
<script>
const BASE = '.';
const COLORS = ['#a78bfa','#60a5fa','#34d399','#fbbf24','#f87171','#f472b6','#38bdf8','#a3e635','#fb923c','#c084fc','#2dd4bf','#e879f9','#facc15','#4ade80','#f97316','#67e8f9','#a78bfa','#818cf8','#fb7185','#fdba74'];
let rankChart, allSnapshots = [], allCurrentData = null, allSectorsData = null;
let activeStocks = new Set();
let lastUpdate = null, refreshMs = 30 * 60 * 1000;
let selectedDate = null;
let sortKey = null, sortDir = 'desc';

async function fetchJSON(url) {
    try { const r = await fetch(url + '?t=' + Date.now()); return await r.json(); }
    catch(e) { console.error('Fetch error:', url, e); return null; }
}

function formatHot(val) {
    const n = parseFloat(val);
    if (n >= 10000) return (n / 10000).toFixed(1) + '万';
    return Math.round(n).toString();
}

function formatPrice(val) {
    if (!val || val === 0) return '-';
    return Number(val).toFixed(2);
}

function renderTags(s) {
    let tags = '';
    if (s.popularity_tag) tags += `<span class="tag tag-hot">${s.popularity_tag}</span>`;
    if (s.concept_tags && s.concept_tags.length) s.concept_tags.slice(0, 2).forEach(t => { tags += `<span class="tag tag-cb">${t}</span>`; });
    return tags;
}

function renderBoardInfo(info) {
    if (!info) return '';
    return `<span class="tag tag-board">${info}</span>`;
}

function renderBoardReason(reason) {
    if (!reason) return '';
    return `<span class="tag tag-reason" title="${reason}">${reason}</span>`;
}

function getUniqueDates(snapshots) {
    const dateMap = {};
    snapshots.forEach(s => {
        const d = s.date || s.time.split(' ')[0];
        if (!dateMap[d]) dateMap[d] = { date: d, count: 0, label: d.slice(5) };
        dateMap[d].count++;
    });
    return Object.values(dateMap).sort((a, b) => a.date.localeCompare(b.date));
}

function renderDateChips(dates) {
    const el = document.getElementById('dateChips');
    if (!dates.length) return;
    let html = `<button class="date-chip${!selectedDate?' active':''}" onclick="selectDate(null)">全部<span class="snap-count">${dates.length}天</span></button>`;
    dates.forEach(d => {
        html += `<button class="date-chip${selectedDate===d.date?' active':''}" onclick="selectDate('${d.date}')">${d.label}<span class="snap-count">${d.count}条</span></button>`;
    });
    el.innerHTML = html;
}

function selectDate(date) {
    selectedDate = date;
    renderDateChips(getUniqueDates(allSnapshots));
    updateView();
}

function getFilteredSnapshots() {
    if (!selectedDate) return allSnapshots;
    return allSnapshots.filter(s => (s.date || s.time.split(' ')[0]) === selectedDate);
}

let sectorSortKey = null, sectorSortDir = 'desc';

function doSectorSort(key) {
    if (sectorSortKey === key) { sectorSortDir = sectorSortDir === 'desc' ? 'asc' : 'desc'; }
    else { sectorSortKey = key; sectorSortDir = 'desc'; }
    document.querySelector('#sectorTable').closest('table').querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('asc', 'desc');
        if (th.dataset.key === key) th.classList.add(sectorSortDir);
    });
    renderSectorTable(allSectorsData, allSectorLeaders);
}

let allSectorLeaders = null;

function renderSectorTable(data, leaders) {
    const tb = document.getElementById('sectorTable');
    if (!data || !data.length) { tb.innerHTML = '<tr><td colspan="5" class="loading">暂无数据</td></tr>'; return; }
    if (leaders) allSectorLeaders = leaders;
    let rows = data.slice(0, 30);
    if (sectorSortKey) {
        const dir = sectorSortDir === 'desc' ? -1 : 1;
        rows = [...rows].sort((a, b) => {
            let va, vb;
            if (sectorSortKey === 'sec_change') { va = Number(a['涨跌幅']) || 0; vb = Number(b['涨跌幅']) || 0; }
            else if (sectorSortKey === 'sec_hot') { va = parseFloat(a['热度']) || 0; vb = parseFloat(b['热度']) || 0; }
            else if (sectorSortKey === 'sec_board') {
                const parseBoard = (s) => { const m = (s || '').match(/(\d+)/); return m ? parseInt(m[1]) : 0; };
                va = parseBoard(a['上板家数']); vb = parseBoard(b['上板家数']);
            }
            else return 0;
            return (va - vb) * dir;
        });
    }
    tb.innerHTML = rows.map(s => {
        const cc = s['涨跌幅'] > 0 ? '#ef4444' : s['涨跌幅'] < 0 ? '#22c55e' : '#9ca3af';
        const cs = s['涨跌幅'] > 0 ? '+' : '';
        const hotStr = s['热度'] ? formatHot(s['热度']) : '-';
        const boardStr = s['上板家数'] || '-';
        const boardColor = boardStr !== '-' ? '#ef4444' : '#64748b';
        // 龙头股列
        let leadersHtml = '<span style="color:#475569;font-size:11px">加载中...</span>';
        if (allSectorLeaders) {
            const name = s['板块名称'];
            const stocks = allSectorLeaders[name];
            if (stocks && stocks.length > 0) {
                leadersHtml = stocks.map((st, idx) => {
                    const code = (st.code || '').replace(/^(SZ|SH|BJ)/, '');
                    const url = `https://finance.baidu.com/stock/ab-${code}`;
                    const hotVal = st.hot_value ? formatHot(st.hot_value) : '-';
                    const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : '🥉';
                    return `<a href="${url}" target="_blank" style="color:#e2e8f0;text-decoration:none;font-size:11px;margin-right:8px;white-space:nowrap" title="${st.name} 热度${st.hot_value}">${medal}<b>${st.name}</b> <span style="color:#f59e0b;font-size:10px">${hotVal}</span></a>`;
                }).join('');
            } else {
                leadersHtml = '<span style="color:#475569;font-size:11px">-</span>';
            }
        }
        return `<tr class="hover"><td style="padding:10px 16px;font-weight:600;color:#f1f5f9">${s['板块名称']}</td><td class="td-right" style="padding:10px 16px;font-weight:600;color:${cc}">${cs}${Number(s['涨跌幅']).toFixed(2)}%</td><td class="td-right" style="padding:10px 16px"><span class="hot-val">${hotStr}</span></td><td class="td-right" style="padding:10px 16px;font-weight:600;color:${boardColor}">${boardStr}</td><td style="padding:10px 16px">${leadersHtml}</td></tr>`;
    }).join('');
}

function buildTrendData(snapshots, currentData) {
    const stockMap = {};
    for (const snap of snapshots) {
        for (const stock of snap.stocks) {
            const cleanName = (stock.name || '').replace(/\s/g, '');
            const cleanCode = (stock.code || '').replace(/^(SZ|SH|BJ)/, '');
            if (!stockMap[cleanCode]) stockMap[cleanCode] = { code: cleanCode, name: cleanName, current_price: stock.price, current_change_pct: stock.change_pct, rank_history: [], popularity_tag: '', concept_tags: [], board_info: '', board_reason: '', market_cap: '' };
            stockMap[cleanCode].name = cleanName;
            stockMap[cleanCode].rank_history.push({ time: snap.time, rank: stock.rank, date: snap.date });
            stockMap[cleanCode].current_price = stock.price;
            stockMap[cleanCode].current_change_pct = stock.change_pct;
            if (stock.board_info) stockMap[cleanCode].board_info = stock.board_info;
            if (stock.board_reason) stockMap[cleanCode].board_reason = stock.board_reason;
            if (stock.market_cap) stockMap[cleanCode].market_cap = stock.market_cap;
        }
    }
    if (currentData) {
        for (const s of currentData) {
            const cc = (s.code || '').replace(/^(SZ|SH|BJ)/, '');
            if (stockMap[cc]) {
                stockMap[cc].current_price = s.price;
                stockMap[cc].current_change_pct = s.change_pct;
                stockMap[cc].popularity_tag = s.popularity_tag || '';
                stockMap[cc].concept_tags = s.concept_tags || [];
                if (s.board_info) stockMap[cc].board_info = s.board_info;
                if (s.board_reason) stockMap[cc].board_reason = s.board_reason;
                if (s.market_cap) stockMap[cc].market_cap = s.market_cap;
            }
        }
    }
    const sorted = Object.values(stockMap).sort((a, b) => {
        const aR = a.rank_history.length ? a.rank_history[a.rank_history.length-1].rank : 999;
        const bR = b.rank_history.length ? b.rank_history[b.rank_history.length-1].rank : 999;
        return aR - bR;
    });
    return { time_labels: snapshots.map(s => s.time), stocks: sorted };
}

/* ===== 排序 ===== */
function doSort(key) {
    if (sortKey === key) {
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
    } else {
        sortKey = key;
        sortDir = 'desc';
    }
    document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('asc', 'desc');
        if (th.dataset.key === key) th.classList.add(sortDir);
    });
    renderMainTable(allCurrentData, currentTrendData?.stocks || []);
}

function getSortNum(val, key) {
    if (key === 'market_cap') {
        if (typeof val === 'string') { const m = val.match(/([\d.]+)/); return m ? parseFloat(m[1]) : 0; }
        return parseFloat(val) || 0;
    }
    if (key === 'hot_value') {
        if (typeof val === 'string') { const n = parseFloat(val); return n >= 10000 ? n : (n >= 1000 ? n : n); }
    }
    if (key === 'trend_streak') {
        // val is like {streak:3, dir:1} or 0
        if (!val || typeof val === 'number') return val || 0;
        return val.streak || 0;
    }
    return parseFloat(val) || 0;
}

function renderMainTable(currentData, trendStocks) {
    const tb = document.getElementById('mainTable');
    if ((!currentData || !currentData.length) && (!trendStocks || !trendStocks.length)) {
        tb.innerHTML = '<tr><td colspan="15" class="loading">暂无数据</td></tr>';
        return;
    }
    const trendMap = {};
    if (trendStocks) trendStocks.forEach(s => { trendMap[s.code] = s; });

    // 预计算所有股票的趋势分析（按天聚合排名）
    const trendAnalysisMap = {};
    const allCodes = new Set([...(currentData || []).map(s => (s.code || '').replace(/^(SZ|SH|BJ)/, '')), ...(trendStocks || []).map(s => s.code)]);
    allCodes.forEach(code => {
        const t = trendMap[code];
        if (!t || !t.rank_history || t.rank_history.length < 2) { trendAnalysisMap[code] = null; return; }
        const hist = t.rank_history;
        // 按天聚合：每天取最后一个快照的排名
        const dailyMap = {};
        for (const h of hist) {
            const d = h.date || h.time?.slice(0, 5);
            dailyMap[d] = h.rank;
        }
        const days = Object.keys(dailyMap);
        const dailyRanks = days.map(d => ({ date: d, rank: dailyMap[d] }));
        if (dailyRanks.length < 2) { trendAnalysisMap[code] = null; return; }
        // 从最新往回找连续上升/下降
        let streak = 0, dir = 0;
        for (let i = dailyRanks.length - 1; i > 0; i--) {
            const diff = dailyRanks[i - 1].rank - dailyRanks[i].rank;
            if (diff === 0) continue;
            if (dir === 0) { dir = diff > 0 ? 1 : -1; streak = 1; }
            else { if ((diff > 0 ? 1 : -1) === dir) streak++; else break; }
        }
        if (streak >= 1) {
            let firstIdx = dailyRanks.length - 1, foundDir = 0;
            for (let i = dailyRanks.length - 1; i > 0; i--) {
                const diff = dailyRanks[i - 1].rank - dailyRanks[i].rank;
                if (diff === 0) continue;
                const curDir = diff > 0 ? 1 : -1;
                if (foundDir === 0) { foundDir = curDir; firstIdx = i - 1; }
                else if (curDir === foundDir) { firstIdx = i - 1; }
                else break;
            }
            const firstRank = dailyRanks[firstIdx].rank;
            const lastRank = dailyRanks[dailyRanks.length - 1].rank;
            trendAnalysisMap[code] = {
                streak, dir,
                totalChange: lastRank - firstRank,
                firstRank, lastRank,
                days: dailyRanks.length
            };
        } else {
            trendAnalysisMap[code] = null;
        }
    });

    const currentCodes = new Set((currentData || []).map(s => (s.code || '').replace(/^(SZ|SH|BJ)/, '')));
    const merged = [...(currentData || [])];
    if (trendStocks) {
        trendStocks.forEach(s => {
            if (!currentCodes.has(s.code)) {
                merged.push({
                    rank: s.rank_history.length ? s.rank_history[s.rank_history.length-1].rank : 999,
                    code: s.code, name: s.name,
                    price: s.current_price, change_pct: s.current_change_pct,
                    hot_value: '', rank_chg: 0,
                    popularity_tag: s.popularity_tag, concept_tags: s.concept_tags,
                    board_info: s.board_info, board_reason: s.board_reason,
                    market_cap: s.market_cap, turnover: 0, browse_rank: 0, _dropped: true
                });
            }
        });
    }

    if (sortKey) {
        const dir = sortDir === 'desc' ? -1 : 1;
        merged.sort((a, b) => {
            let va, vb;
            if (sortKey === 'trend_streak') {
                const ta = trendAnalysisMap[(a.code || '').replace(/^(SZ|SH|BJ)/, '')];
                const tb2 = trendAnalysisMap[(b.code || '').replace(/^(SZ|SH|BJ)/, '')];
                va = ta ? ta.streak : 0; vb = tb2 ? tb2.streak : 0;
            } else {
                va = getSortNum(a[sortKey], sortKey);
                vb = getSortNum(b[sortKey], sortKey);
            }
            if (va !== vb) return (va - vb) * dir;
            return (a.rank || 999) - (b.rank || 999);
        });
    } else {
        merged.sort((a, b) => (a.rank || 999) - (b.rank || 999));
    }

    tb.innerHTML = merged.map((s, i) => {
        const code = (s.code || '').replace(/^(SZ|SH|BJ)/, '');
        const baiduUrl = `https://finance.baidu.com/stock/ab-${code}`;
        const rc = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
        const dropStyle = s._dropped ? 'opacity:0.45;' : '';
        const priceStr = formatPrice(s.price);
        const cc = s.change_pct > 0 ? '#ef4444' : s.change_pct < 0 ? '#22c55e' : '#9ca3af';
        const cs = s.change_pct > 0 ? '+' : '';
        const tag = s.change_pct >= 9.9 ? '<span class="tag tag-zt">涨停</span>' : s.change_pct >= 5 ? '<span class="tag tag-qz">强势</span>' : '';
        const hotStr = s.hot_value ? formatHot(s.hot_value) : '-';
        const chg = s.rank_chg || 0;
        const chgClass = chg > 0 ? 'up' : chg < 0 ? 'dn' : 'fl';
        const chgText = chg > 0 ? '↑'+chg : chg < 0 ? '↓'+Math.abs(chg) : '—';
        const boardHtml = renderBoardInfo(s.board_info);
        const reasonHtml = renderBoardReason(s.board_reason);
        const extraTags = renderTags(s);
        // 连续趋势列
        const ta = trendAnalysisMap[code];
        let trendHtml = '<span style="color:#475569">-</span>';
        if (ta) {
            const isUp = ta.dir === 1;
            const tColor = isUp ? '#ef4444' : '#22c55e';
            const tIcon = isUp ? '🔥' : '💧';
            const chgAbs = Math.abs(ta.totalChange);
            const chgText = isUp ? `↑${chgAbs}` : `↓${chgAbs}`;
            trendHtml = `<span style="color:${tColor};font-weight:700;font-size:12px" title="${ta.firstRank}→${ta.lastRank}">${tIcon}${chgText}</span>`;
        }
        let sparkHtml = '';
        const trend = trendMap[code];
        if (trend && trend.rank_history && trend.rank_history.length >= 2) {
            const hist = trend.rank_history;
            const prev = hist[hist.length-2].rank;
            const curr = hist[hist.length-1].rank;
            const diff = prev - curr;
            const sparkColor = diff > 0 ? '#ef4444' : diff < 0 ? '#22c55e' : '#64748b';
            const sparkData = hist.slice(-20);
            const maxR = Math.max(...sparkData.map(h=>h.rank), 1);
            const pts = sparkData.map((h,j) => `${j*(56/(sparkData.length-1||1))+2},${Math.min(h.rank/maxR*18+2,22)}`).join(' ');
            sparkHtml = `<svg width="60" height="24"><polyline fill="none" stroke="${sparkColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/></svg>`;
        } else if (trend && trend.rank_history && trend.rank_history.length === 1) {
            sparkHtml = `<span style="color:#64748b;font-size:10px">新</span>`;
        }
        const capStr = s.market_cap || '-';
        const turnoverStr = s.turnover ? s.turnover + '%' : '-';
        const browseStr = s.browse_rank ? '#' + s.browse_rank : '-';
        const browseStyle = s.browse_rank && s.browse_rank <= 10 ? 'color:#ef4444;font-weight:700' : s.browse_rank ? 'color:#f59e0b' : 'color:#64748b';
        return `<tr class="hover" style="${dropStyle}">
            <td class="td-center"><span class="rank-badge ${rc}">${s.rank}</span></td>
            <td class="td-right" style="font-size:12px;${browseStyle}">${browseStr}</td>
            <td><a class="stock-link" href="${baiduUrl}" target="_blank">${s.name}</a>${tag}</td>
            <td class="td-right price-val">${priceStr}</td>
            <td class="td-right" style="font-weight:600;color:${cc}">${cs}${Number(s.change_pct).toFixed(2)}%</td>
            <td class="td-right" style="font-size:12px">${turnoverStr}</td>
            <td class="td-right hot-val">${hotStr}</td>
            <td class="td-center ${chgClass}" style="font-weight:600">${chgText}</td>
            <td class="td-center">${trendHtml}</td>
            <td>${boardHtml}</td>
            <td>${reasonHtml}</td>
            <td style="font-size:11px">${extraTags}</td>
            <td class="td-center">${sparkHtml}</td>
            <td class="td-right cap-val">${capStr}</td>
        </tr>`;
    }).join('');
}

function renderSelector(stocks) {
    const el = document.getElementById('stockSelector');
    if (!stocks || !stocks.length) return;
    if (activeStocks.size === 0) stocks.slice(0, 5).forEach(s => activeStocks.add(s.code));
    el.innerHTML = stocks.map(s =>
        `<button class="stock-btn${activeStocks.has(s.code)?' active':''}" onclick="toggleStock('${s.code}')">${s.name}</button>`
    ).join('');
}

function toggleStock(code) {
    if (activeStocks.has(code)) activeStocks.delete(code);
    else activeStocks.add(code);
    updateChart();
    renderSelector(currentTrendData?.stocks || []);
}

let currentTrendData = null;

function createChart(labels) {
    const ctx = document.getElementById('rankChart').getContext('2d');
    rankChart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [] },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { color: '#94a3b8', usePointStyle: true, padding: 14, font: { size: 11 } } },
                tooltip: { backgroundColor: '#1e293b', titleColor: '#f1f5f9', bodyColor: '#94a3b8', borderColor: 'rgba(139,92,246,0.3)', borderWidth: 1,
                    callbacks: { label: ctx => ctx.dataset.label + ': 第' + ctx.parsed.y + '名' }
                }
            },
            scales: {
                y: { reverse: true, min: 1, title: { display: true, text: '排名', color: '#64748b' }, ticks: { color: '#64748b', stepSize: 5 }, grid: { color: 'rgba(75,85,99,0.2)' } },
                x: { ticks: { color: '#64748b', maxRotation: 45, maxTicksLimit: 20 }, grid: { color: 'rgba(75,85,99,0.1)' } }
            },
            animation: { duration: 600, easing: 'easeOutQuart' }
        }
    });
}

function updateChart() {
    if (!rankChart || !currentTrendData) return;
    const datasets = [];
    let ci = 0;
    (currentTrendData.stocks || []).forEach(s => {
        if (!activeStocks.has(s.code)) return;
        datasets.push({
            label: s.name, data: s.rank_history.map(h => h.rank),
            borderColor: COLORS[ci % COLORS.length], backgroundColor: COLORS[ci % COLORS.length] + '20',
            borderWidth: 2.5, pointRadius: s.rank_history.length > 50 ? 0 : 2, pointHoverRadius: 5, tension: 0.3, fill: false
        });
        ci++;
    });
    rankChart.data.datasets = datasets;
    rankChart.update();
}

function updateCountdown() {
    if (!lastUpdate) return;
    const elapsed = Date.now() - lastUpdate;
    const remain = Math.max(0, refreshMs - elapsed);
    const m = Math.floor(remain / 60000);
    const s = Math.floor((remain % 60000) / 1000);
    document.getElementById('countdown').textContent = `${m}:${s.toString().padStart(2,'0')} 后刷新`;
}

function updateView() {
    const filtered = getFilteredSnapshots();
    currentTrendData = buildTrendData(filtered, allCurrentData);
    const info = document.getElementById('viewInfo');
    const dateLabel = document.getElementById('detailDateLabel');
    if (selectedDate) {
        info.textContent = `显示 ${selectedDate.slice(5)} 共 ${filtered.length} 条快照`;
        dateLabel.textContent = `📅 ${selectedDate}`;
    } else {
        info.textContent = `显示全部 ${filtered.length} 条快照（${getUniqueDates(allSnapshots).length} 天）`;
        dateLabel.textContent = '';
    }
    renderSelector(currentTrendData.stocks);
    renderMainTable(allCurrentData, currentTrendData.stocks);
    if (!rankChart) { createChart(currentTrendData.time_labels); }
    else { rankChart.data.labels = currentTrendData.time_labels; updateChart(); }
}

async function loadAll() {
    // 第一阶段：立即加载当前数据，快速渲染热榜表格
    const current = await fetchJSON(BASE + '/data/current.json');
    allCurrentData = current?.data || null;
    if (current) {
        document.getElementById('updateTime').textContent = '更新: ' + (current.update_time || '未知');
    }
    // 立即渲染表格（使用当前数据，无趋势分析）
    if (allCurrentData) {
        renderMainTable(allCurrentData, []);
    }

    // 第二阶段：并行加载快照和板块（不阻塞表格显示）
    const [snapshots, sectors] = await Promise.all([
        fetchJSON(BASE + '/data/snapshots.json'),
        fetchJSON(BASE + '/data/sectors.json')
    ]);
    allSnapshots = snapshots || [];
    allSectorsData = sectors?.data || null;

    // 渲染板块（先渲染，龙头股稍后异步加载）
    if (allSectorsData) renderSectorTable(allSectorsData, null);

    // 渲染趋势分析（需要快照数据）
    if (allSnapshots.length > 0) {
        renderDateChips(getUniqueDates(allSnapshots));
        updateView();
    } else {
        document.getElementById('mainTable').innerHTML = '<tr><td colspan="14" class="loading">数据采集中，请稍候...（首次部署需等待 GitHub Actions 运行）</td></tr>';
    }
    lastUpdate = Date.now();

    // 第三阶段：独立异步加载板块龙头股（不阻塞任何内容）
    loadSectorLeaders();
}

async function loadSectorLeaders() {
    try {
        const leadersData = await fetchJSON(BASE + '/data/sector_leaders.json');
        if (leadersData && leadersData.data) {
            allSectorLeaders = leadersData.data;
            // 龙头股数据到达后，重新渲染板块表格填充龙头股列
            if (allSectorsData) renderSectorTable(allSectorsData, allSectorLeaders);
            console.log('龙头股数据加载完成:', Object.keys(allSectorLeaders).length, '个板块');
        }
    } catch(e) {
        console.log('龙头股数据加载失败（不影响其他功能）:', e);
    }
}

loadAll();
setInterval(updateCountdown, 1000);
setInterval(loadAll, refreshMs);
</script>
